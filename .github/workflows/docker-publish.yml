name: Publish Docker Images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker tag to publish"
        required: true
        default: "latest"
  push:
    tags:
      - "v*"

env:
  DOCKERHUB_NAMESPACE: kinsanka

jobs:
  publish-backend:
    name: Publish Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/excalidash-backend:${{ steps.vars.outputs.tag }}
            ${{ env.DOCKERHUB_NAMESPACE }}/excalidash-backend:latest

  publish-frontend:
    name: Publish Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_APP_VERSION=${{ steps.vars.outputs.tag }}
            VITE_APP_BUILD_LABEL=${{ github.sha }}
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/excalidash-frontend:${{ steps.vars.outputs.tag }}
            ${{ env.DOCKERHUB_NAMESPACE }}/excalidash-frontend:latest
